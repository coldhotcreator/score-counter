<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩识别与统计</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#007AFF',
                        secondary: '#F2F2F7',
                        text: '#1C1C1E',
                        lightText: '#8E8E93',
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .glass-effect {
                backdrop-filter: blur(10px);
                background-color: rgba(255, 255, 255, 0.7);
            }
            .shadow-apple {
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            }
        }
    </style>
</head>
<body class="bg-secondary min-h-screen font-sans text-text">
    <div class="container mx-auto px-4 py-8 max-w-md">
        <!-- 应用标题 -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-semibold mb-2">成绩识别与统计</h1>
            <p class="text-lightText">语音输入成绩，自动统计分数</p>
        </div>

        <!-- 语音输入区域 -->
        <div class="mb-8">
            <div id="recognition-status" class="text-center mb-4 text-lightText">
                点击开始按钮进行语音输入
            </div>
            <div class="flex justify-center">
                <button id="start-btn" class="bg-primary text-white rounded-full w-20 h-20 flex items-center justify-center shadow-apple transition-all duration-300 hover:scale-105">
                    <i class="fa fa-microphone text-2xl"></i>
                </button>
            </div>
            
            <!-- 权限提示 -->
            <div id="permission-alert" class="hidden mt-4 p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
                <div class="flex items-start">
                    <i class="fa fa-exclamation-triangle text-yellow-600 mt-1 mr-2"></i>
                    <div class="text-sm">
                        <p class="text-yellow-800 font-medium mb-2">需要麦克风权限</p>
                        <p class="text-yellow-700 mb-2">请按以下步骤允许麦克风权限：</p>
                        <ol class="list-decimal list-inside text-yellow-700 space-y-1 text-xs">
                            <li>点击浏览器地址栏左侧的锁图标</li>
                            <li>找到"麦克风"选项</li>
                            <li>选择"允许"或"总是允许"</li>
                            <li>刷新页面后重试</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>

        <!-- 手动输入区域 -->
        <div class="mb-8">
            <div class="bg-white rounded-xl shadow-apple p-4">
                <h3 class="text-sm font-medium mb-3 text-lightText">手动输入成绩</h3>
                <div class="grid grid-cols-5 gap-2">
                    <button onclick="manualInput('优')" class="bg-blue-50 text-blue-600 py-2 px-3 rounded-lg text-sm font-medium hover:bg-blue-100 transition-colors">优</button>
                    <button onclick="manualInput('良')" class="bg-green-50 text-green-600 py-2 px-3 rounded-lg text-sm font-medium hover:bg-green-100 transition-colors">良</button>
                    <button onclick="manualInput('A')" class="bg-purple-50 text-purple-600 py-2 px-3 rounded-lg text-sm font-medium hover:bg-purple-100 transition-colors">A</button>
                    <button onclick="manualInput('B')" class="bg-orange-50 text-orange-600 py-2 px-3 rounded-lg text-sm font-medium hover:bg-orange-100 transition-colors">B</button>
                    <button onclick="manualInput('1颗星')" class="bg-yellow-50 text-yellow-600 py-2 px-3 rounded-lg text-sm font-medium hover:bg-yellow-100 transition-colors">1星</button>
                </div>
                <div class="mt-3">
                    <input type="number" id="star-input" placeholder="输入星星数量" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                    <button onclick="manualStarInput()" class="mt-2 w-full bg-primary text-white py-2 rounded-lg text-sm font-medium hover:bg-blue-600 transition-colors">添加星星</button>
                </div>
            </div>
        </div>

        <!-- 成绩统计区域 -->
        <div class="bg-white rounded-xl shadow-apple p-6 mb-8">
            <h2 class="text-lg font-medium mb-4">成绩统计</h2>
            
            <!-- 成绩列表 -->
            <div class="space-y-3">
                <div class="flex justify-between items-center py-2 border-b border-gray-100">
                    <div class="flex items-center">
                        <span class="text-text">优</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span id="excellent-count" class="text-lightText">0</span>
                        <span id="excellent-score" class="text-primary font-medium">0</span>
                    </div>
                </div>
                
                <div class="flex justify-between items-center py-2 border-b border-gray-100">
                    <div class="flex items-center">
                        <span class="text-text">良</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span id="good-count" class="text-lightText">0</span>
                        <span id="good-score" class="text-primary font-medium">0</span>
                    </div>
                </div>
                
                <div class="flex justify-between items-center py-2 border-b border-gray-100">
                    <div class="flex items-center">
                        <span class="text-text">A</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span id="a-count" class="text-lightText">0</span>
                        <span id="a-score" class="text-primary font-medium">0</span>
                    </div>
                </div>
                
                <div class="flex justify-between items-center py-2 border-b border-gray-100">
                    <div class="flex items-center">
                        <span class="text-text">B</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span id="b-count" class="text-lightText">0</span>
                        <span id="b-score" class="text-primary font-medium">0</span>
                    </div>
                </div>
                
                <div class="flex justify-between items-center py-2">
                    <div class="flex items-center">
                        <span class="text-text">星</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span id="star-count" class="text-lightText">0</span>
                        <span id="star-score" class="text-primary font-medium">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 总分显示 -->
        <div class="fixed bottom-8 right-8 bg-primary text-white rounded-full w-16 h-16 flex items-center justify-center shadow-apple">
            <span id="total-score" class="text-xl font-bold">0</span>
        </div>
    </div>

    <script>
        // 初始化成绩数据
        let scores = {
            excellent: 0,  // 优
            good: 0,       // 良
            a: 0,          // A
            b: 0,          // B
            star: 0        // 星
        };

        // 分数计算规则
        const scoreValues = {
            excellent: 2,
            good: 1,
            a: 2,
            b: 1,
            star: 1
        };

        // 语音识别对象
        let recognition;

        // 初始化语音识别
        function initRecognition() {
            // 尝试使用标准API和webkit前缀API
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition || window.mozSpeechRecognition || window.msSpeechRecognition;
            
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'zh-CN';
                recognition.continuous = false;
                recognition.interimResults = true; // 允许中间结果
                recognition.maxAlternatives = 3; // 提供多个识别结果
                recognition.timeout = 5000; // 5秒超时

                recognition.onstart = function() {
                    document.getElementById('recognition-status').textContent = '正在聆听，请说出成绩...';
                    document.getElementById('start-btn').classList.add('animate-pulse');
                    document.getElementById('start-btn').classList.add('bg-red-500');
                    console.log('语音识别已开始');
                };

                recognition.onresult = function(event) {
                    console.log('识别结果:', event.results);
                    
                    // 处理所有可能的结果
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        if (event.results[i].isFinal) {
                            const transcript = event.results[i][0].transcript;
                            console.log('最终识别文本:', transcript);
                            
                            // 显示识别结果
                            document.getElementById('recognition-status').textContent = '识别结果: ' + transcript;
                            
                            // 处理识别结果
                            processTranscript(transcript);
                            
                            // 延迟重置状态
                            setTimeout(() => {
                                document.getElementById('recognition-status').textContent = '点击开始按钮进行语音输入';
                            }, 2000);
                        } else {
                            // 显示中间结果
                            const interimTranscript = event.results[i][0].transcript;
                            console.log('中间识别文本:', interimTranscript);
                            document.getElementById('recognition-status').textContent = '正在识别: ' + interimTranscript;
                        }
                    }
                };

                recognition.onend = function() {
                    document.getElementById('recognition-status').textContent = '点击开始按钮进行语音输入';
                    document.getElementById('start-btn').classList.remove('animate-pulse');
                    document.getElementById('start-btn').classList.remove('bg-red-500');
                    console.log('语音识别已结束');
                };

                recognition.onerror = function(event) {
                    console.error('语音识别错误:', event.error);
                    let errorMessage = '识别失败，请重试';
                    
                    // 针对常见错误提供更具体的提示
                    switch(event.error) {
                        case 'no-speech':
                            errorMessage = '未检测到语音，请重试';
                            break;
                        case 'audio-capture':
                            errorMessage = '无法访问麦克风，请检查权限';
                            document.getElementById('permission-alert').classList.remove('hidden');
                            break;
                        case 'not-allowed':
                            errorMessage = '麦克风权限被拒绝';
                            document.getElementById('permission-alert').classList.remove('hidden');
                            break;
                        case 'network':
                            errorMessage = '网络错误，请检查网络连接';
                            break;
                        case 'service-not-allowed':
                            errorMessage = '语音服务不可用，请稍后重试';
                            break;
                    }
                    
                    document.getElementById('recognition-status').textContent = errorMessage;
                    document.getElementById('start-btn').classList.remove('animate-pulse');
                    document.getElementById('start-btn').classList.remove('bg-red-500');
                };
            } else {
                document.getElementById('recognition-status').textContent = '您的浏览器不支持语音识别';
                console.error('浏览器不支持语音识别API');
            }
        }

        // 处理识别结果
        function processTranscript(transcript) {
            console.log('识别结果:', transcript);
            
            // 转换为小写，提高匹配成功率
            const lowerTranscript = transcript.toLowerCase();
            
            // 处理成绩等级
            if (lowerTranscript.includes('优') || lowerTranscript.includes('优秀')) {
                scores.excellent++;
                console.log('识别到：优');
            }
            if (lowerTranscript.includes('良') || lowerTranscript.includes('良好')) {
                scores.good++;
                console.log('识别到：良');
            }
            if (lowerTranscript.includes('a')) {
                scores.a++;
                console.log('识别到：A');
            }
            if (lowerTranscript.includes('b')) {
                scores.b++;
                console.log('识别到：B');
            }
            
            // 处理星星数量（更灵活的匹配）
            // 匹配 "3颗星"、"3星"、"三星" 等形式
            const starMatch1 = transcript.match(/(\d+)颗?星/);
            const starMatch2 = transcript.match(/(\d+)星/);
            const starMatch3 = transcript.match(/(三|四|五|六|七|八|九|十|一|二|两)(颗)?星/);
            
            if (starMatch1) {
                const starCount = parseInt(starMatch1[1]);
                scores.star += starCount;
                console.log('识别到星星数量：', starCount);
            } else if (starMatch2) {
                const starCount = parseInt(starMatch2[1]);
                scores.star += starCount;
                console.log('识别到星星数量：', starCount);
            } else if (starMatch3) {
                // 处理中文数字
                const chineseNum = starMatch3[1];
                const numMap = {
                    '一': 1, '二': 2, '两': 2, '三': 3, '四': 4, '五': 5,
                    '六': 6, '七': 7, '八': 8, '九': 9, '十': 10
                };
                if (numMap[chineseNum]) {
                    scores.star += numMap[chineseNum];
                    console.log('识别到星星数量：', numMap[chineseNum]);
                }
            }
            
            // 更新UI
            updateUI();
        }

        // 更新UI
        function updateUI() {
            // 更新各成绩等级的数量和分数
            document.getElementById('excellent-count').textContent = scores.excellent;
            document.getElementById('excellent-score').textContent = scores.excellent * scoreValues.excellent;
            
            document.getElementById('good-count').textContent = scores.good;
            document.getElementById('good-score').textContent = scores.good * scoreValues.good;
            
            document.getElementById('a-count').textContent = scores.a;
            document.getElementById('a-score').textContent = scores.a * scoreValues.a;
            
            document.getElementById('b-count').textContent = scores.b;
            document.getElementById('b-score').textContent = scores.b * scoreValues.b;
            
            document.getElementById('star-count').textContent = scores.star;
            document.getElementById('star-score').textContent = scores.star * scoreValues.star;
            
            // 计算并更新总分
            const total = 
                scores.excellent * scoreValues.excellent +
                scores.good * scoreValues.good +
                scores.a * scoreValues.a +
                scores.b * scoreValues.b +
                scores.star * scoreValues.star;
            
            document.getElementById('total-score').textContent = total;
        }

        // 手动输入成绩
        function manualInput(score) {
            processTranscript(score);
        }

        // 手动输入星星数量
        function manualStarInput() {
            const input = document.getElementById('star-input');
            const starCount = parseInt(input.value);
            if (starCount > 0) {
                scores.star += starCount;
                updateUI();
                input.value = '';
            }
        }

        // 事件监听器
        document.getElementById('start-btn').addEventListener('click', function() {
            if (recognition) {
                recognition.start();
            }
        });

        // 初始化
        window.onload = function() {
            initRecognition();
        };
    </script>
</body>
</html>
